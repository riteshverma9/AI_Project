apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai_project
  labels:
    app: ai_project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai_project
  template:
    metadata:
      labels:
        app: ai_project
    spec:
      containers:
        - name: ai_project
          image: ai_project:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai_project-secrets
                  key: NVIDIA_API_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
